baseURL = "https://aibelkingslayer.github.io/"
locale = "en-us"
title = "Security Slayer"
theme = "PaperMod"
paginate = 5
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[params]
  env = "production"
  title = "Security Slayer"
  description = "Cybersecurity, penetration testing, and CTF writeups by Aibel."
  author = "Aibel"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = false
  ShowAllPagesInArchive = true
  ShowPageNums = true

  [params.homeInfoParams]
    Title = "Hi, I'm Aibel"
    Content = "A cybersecurity professional sharing research on penetration testing, offensive security, and CTF writeups. OSCP certified. Always learning, always hacking (legally)."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/AibelKingslayer"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:aibelarci@gmail.com"

[taxonomies]
  tag = "tags"
  category = "categories"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "Search"
  url = "/search/"
  weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]
